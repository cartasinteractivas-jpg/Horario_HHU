        button { width: 100%; padding: 0.85rem; background-color: #007aff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background-color 0.2s; }

<body>

            <div class="input-group">

    <script>

        if (localStorage.getItem('hhu_admin_logged_in') === 'true') {

        loginForm.addEventListener('submit', (event) => {

            const usuarioInput = document.getElementById('usuario').value;
            const passwordInput = document.getElementById('password').value;

            } else {
                // Si no, mostramos un error
                errorMessage.textContent = 'Usuario o contraseña incorrectos.';
                errorMessage.style.display = 'block';
            }
        });

    // Lógica para cerrar sesión
    document.getElementById('logout-button').addEventListener('click', () => {
        // Al cerrar sesión, simplemente borramos nuestra "bandera"
        localStorage.removeItem('hhu_admin_logged_in');
        window.location.href = 'login.html';
    });

    // --- El resto de la lógica del calendario sigue igual ---
    function renderCalendar() {
        const calendarioGrid = document.querySelector('.calendario-grid');
        const mes = 2; const ano = 2026;
        const primerDiaSemana = new Date(ano, mes, 1).getDay();
        const diasEnMes = new Date(ano, mes + 1, 0).getDate();
        const offset = (primerDiaSemana === 0) ? 6 : primerDiaSemana - 1;

        document.querySelectorAll('.dia-calendario, .dia-vacio').forEach(el => el.remove());

        for (let i = 0; i < offset; i++) {
            const div = document.createElement('div');
            div.classList.add('dia-vacio');
            calendarioGrid.appendChild(div);
        }

        for (let dia = 1; dia <= diasEnMes; dia++) {
            const celdaDia = document.createElement('div');
            celdaDia.classList.add('dia-calendario');
            celdaDia.innerHTML = `<div class="dia-numero">${dia}</div><button class="boton-dia" onclick="modificarDia(${dia})">Modificar</button>`;
            calendarioGrid.appendChild(celdaDia);
        }
    }

    function modificarDia(dia) {
        const personalSeleccionado = document.getElementById('selectorPersonal').value;
        localStorage.setItem('diaSeleccionado', dia);
        localStorage.setItem('personalSeleccionado', personalSeleccionado);
        window.location.href = 'modificar_dia.html';
    }
    
    // Renderizar el calendario (solo se ejecutará si el chequeo de arriba pasa)
    renderCalendar();
</script>
