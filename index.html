<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHU - Administración de Horarios</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Mismos estilos de antes */
        body { font-family: sans-serif; background-color: #ecf0f1; color: #2c3e50; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .header h1 { margin: 0; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .selector-personal { padding: 8px; font-size: 16px; border-radius: 4px; }
        #logout-button { background-color: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .calendario-grid { display: grid; grid-template-columns: repeat(7, 1fr ); gap: 5px; }
        .dia-semana, .dia-calendario { background-color: white; padding: 10px; text-align: center; border-radius: 4px; }
        .dia-semana { font-weight: bold; background-color: #95a5a6; color: white; }
        .dia-calendario { min-height: 80px; display: flex; flex-direction: column; justify-content: space-between; }
        .dia-numero { font-size: 18px; font-weight: bold; align-self: flex-start; }
        .dia-vacio { background-color: transparent; border: none; }
        .boton-dia { background-color: #3498db; color: white; border: none; border-radius: 4px; padding: 8px; cursor: pointer; width: 100%; }
        .boton-dia:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Horarios - Marzo 2026</h1>
        <div class="controls">
            <select id="selectorPersonal" class="selector-personal">
                <option value="Enfermero">Enfermeros</option>
                <option value="Técnico">Técnicos</option>
            </select>
            <button id="logout-button">Cerrar Sesión</button>
        </div>
    </div>

    <div class="calendario-grid">
        <div class="dia-semana">L</div> <div class="dia-semana">M</div> <div class="dia-semana">X</div> <div class="dia-semana">J</div> <div class="dia-semana">V</div> <div class="dia-semana">S</div> <div class="dia-semana">D</div>
    </div>

    <script>
        // 1. Misma configuración del cliente Supabase
        const supabaseUrl = 'https://rrubzwdrsuyjntoewmew.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJydWJ6d2Ryc3V5am50b2VqbWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNDgxMzksImV4cCI6MjA4NzcyNDEzOX0.2skpmRdeb43Ck0IUAKyBcW5g3KAHPf7_st-QaAJ2K0E';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey );

        // 2. Proteger la página
        supabase.auth.onAuthStateChange((event, session) => {
            if (!session) {
                // Si no hay sesión (o el usuario cierra sesión), lo enviamos al login.
                window.location.href = 'login.html';
            }
        });

        // 3. Lógica para cerrar sesión
        document.getElementById('logout-button').addEventListener('click', async () => {
            await supabase.auth.signOut();
            // El onAuthStateChange de arriba se encargará de la redirección.
        });

        // --- Lógica del Calendario ---
        function renderCalendar() {
            const calendarioGrid = document.querySelector('.calendario-grid');
            const mes = 2; // Marzo
            const ano = 2026;
            const primerDiaSemana = new Date(ano, mes, 1).getDay();
            const diasEnMes = new Date(ano, mes + 1, 0).getDate();
            const offset = (primerDiaSemana === 0) ? 6 : primerDiaSemana - 1;

            // Limpiar calendario anterior antes de re-dibujar
            document.querySelectorAll('.dia-calendario, .dia-vacio').forEach(el => el.remove());

            for (let i = 0; i < offset; i++) {
                const div = document.createElement('div');
                div.classList.add('dia-vacio');
                calendarioGrid.appendChild(div);
            }

            for (let dia = 1; dia <= diasEnMes; dia++) {
                const celdaDia = document.createElement('div');
                celdaDia.classList.add('dia-calendario');
                celdaDia.innerHTML = `<div class="dia-numero">${dia}</div><button class="boton-dia" onclick="modificarDia(${dia})">Modificar</button>`;
                calendarioGrid.appendChild(celdaDia);
            }
        }

        function modificarDia(dia) {
            const personalSeleccionado = document.getElementById('selectorPersonal').value;
            // Guardamos los parámetros en localStorage para que la otra página los lea
            localStorage.setItem('diaSeleccionado', dia);
            localStorage.setItem('personalSeleccionado', personalSeleccionado);
            // Redirigimos a la página del puzzle
            window.location.href = 'modificar_dia.html';
        }
        
        // Renderizar el calendario al cargar la página
        renderCalendar();
    </script>

</body>
</html>
