<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHU - Iniciar Sesión</title>
    <!-- 1. Importar el cliente de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .login-container { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1 ); text-align: center; width: 320px; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }

        .error-message { color: #e74c3c; margin-top: 15px; display: none; }

</head>
<body>

            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required value="admin123">
            </div>
            <button type="submit">Ingresar</button>
            <p id="error-message" class="error-message"></p>
        </form>
    </div>

    <script>
        // 2. Configurar el cliente de Supabase con tus nuevas credenciales
        const supabaseUrl = 'https://rrubzwdrsuyjntoewmew.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJydWJ6d2Ryc3V5am50b2VqbWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNDgxMzksImV4cCI6MjA4NzcyNDEzOX0.2skpmRdeb43Ck0IUAKyBcW5g3KAHPf7_st-QaAJ2K0E';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey );

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevenir el envío tradicional del formulario
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorMessage.style.display = 'none'; // Ocultar errores previos

            // 3. Intentar iniciar sesión con Supabase
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,

            if (error) {
                console.error('Error en el login:', error.message);
                errorMessage.textContent = 'Usuario o contraseña incorrectos.';
                errorMessage.style.display = 'block';

                console.log('Login exitoso:', data);

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHU - Modificar Horario</title>
    <!-- 1. Importar librería para arrastrar y soltar (SortableJS) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #ecf0f1; color: #2c3e50; padding: 20px; }
        .main-container { max-width: 900px; margin: auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1 ); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #bdc3c7; padding-bottom: 15px; }
        .header h1 { margin: 0; font-size: 24px; }
        .nav-button { background-color: #95a5a6; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .nav-button:hover { background-color: #7f8c8d; }
        .turno-container { display: none; /* Se mostrará con JS */ }
        .turno-container.active { display: block; }
        .turno-header { display: flex; justify-content: space-between; align-items: center; background-color: #3498db; color: white; padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; }
        .turno-header h2 { margin: 0; }
        .ubicacion-lista { list-style: none; padding: 0; }
        .ubicacion-item { display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
        .ubicacion-nombre { font-weight: bold; width: 150px; color: #34495e; }
        .personal-fichas { flex-grow: 1; display: flex; gap: 10px; min-height: 40px; /* Área para soltar */ }
        .ficha-personal { background-color: #ecf0f1; padding: 8px 12px; border-radius: 4px; cursor: grab; border: 1px solid #bdc3c7; user-select: none; }
        .ficha-personal:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background: #c8ebfb; } /* Estilo del fantasma al arrastrar */
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <a href="calendario.html" class="nav-button">&larr; Volver al Calendario</a>
            <h1 id="fecha-titulo">Modificando: 01 de Marzo, 2026</h1>
            <button class="nav-button" onclick="guardarCambios()">Guardar Cambios</button>
        </div>

        <!-- Contenedor para el Turno de Día -->
        <div id="turno-dia" class="turno-container active">
            <div class="turno-header">
                <h2>Turno Día</h2>
                <button class="nav-button" onclick="mostrarTurno('noche')">Ver Turno Noche &rarr;</button>
            </div>
            <ul class="ubicacion-lista" id="lista-dia">
                <!-- Las ubicaciones y el personal se cargarán aquí con JavaScript -->
            </ul>
        </div>

        <!-- Contenedor para el Turno de Noche -->
        <div id="turno-noche" class="turno-container">
            <div class="turno-header">
                <button class="nav-button" onclick="mostrarTurno('dia')">&larr; Ver Turno Día</button>
                <h2>Turno Noche</h2>
            </div>
            <ul class="ubicacion-lista" id="lista-noche">
                <!-- Las ubicaciones y el personal se cargarán aquí con JavaScript -->
            </ul>
        </div>
    </div>

    <script>
        // --- DATOS DE EJEMPLO (Esto vendría de Supabase) ---
        const ubicacionesTecnicos = ["MUESTRA", "UCIM", "LADO I", "LADO II", "S. MENTAL", "SALIDA"];
        const personalDia = [
            { nombre: "DIAZ H.", ubicacion: "MUESTRA" },
            { nombre: "FARFAN S.", ubicacion: "MUESTRA" },
            { nombre: "AUQUIPATA S.", ubicacion: "UCIM" },
            { nombre: "MONTERO P.", ubicacion: "LADO I" },
            { nombre: "VALDIVIA I.", ubicacion: "LADO II" },
        ];
        const personalNoche = [
            { nombre: "CCOSCCO S.", ubicacion: "MUESTRA" },
            { nombre: "GUEVARA S.", ubicacion: "UCIM" },
            { nombre: "HERNANDEZ P.", ubicacion: "LADO I" },
        ];

        // --- LÓGICA DE LA PÁGINA ---
        
        // Función para renderizar las listas
        function renderizarListas() {
            const listaDiaEl = document.getElementById('lista-dia');
            const listaNocheEl = document.getElementById('lista-noche');
            listaDiaEl.innerHTML = '';
            listaNocheEl.innerHTML = '';

            // Renderizar ubicaciones de DÍA
            ubicacionesTecnicos.forEach(nombreUbicacion => {
                const item = document.createElement('li');
                item.classList.add('ubicacion-item');
                item.innerHTML = `<div class="ubicacion-nombre">${nombreUbicacion}</div><div class="personal-fichas" id="ubicacion-dia-${nombreUbicacion.replace(/\s+/g, '')}"></div>`;
                listaDiaEl.appendChild(item);
            });

            // Renderizar ubicaciones de NOCHE
            ubicacionesTecnicos.forEach(nombreUbicacion => {
                const item = document.createElement('li');
                item.classList.add('ubicacion-item');
                item.innerHTML = `<div class="ubicacion-nombre">${nombreUbicacion}</div><div class="personal-fichas" id="ubicacion-noche-${nombreUbicacion.replace(/\s+/g, '')}"></div>`;
                listaNocheEl.appendChild(item);
            });

            // Colocar al personal de DÍA en sus ubicaciones
            personalDia.forEach(p => {
                const contenedor = document.getElementById(`ubicacion-dia-${p.ubicacion.replace(/\s+/g, '')}`);
                if (contenedor) {
                    contenedor.innerHTML += `<div class="ficha-personal">${p.nombre}</div>`;
                }
            });

            // Colocar al personal de NOCHE en sus ubicaciones
            personalNoche.forEach(p => {
                const contenedor = document.getElementById(`ubicacion-noche-${p.ubicacion.replace(/\s+/g, '')}`);
                if (contenedor) {
                    contenedor.innerHTML += `<div class="ficha-personal">${p.nombre}</div>`;
                }
            });

            // 2. Hacer que todas las áreas de fichas sean "arrastrables"
            document.querySelectorAll('.personal-fichas').forEach(el => {
                new Sortable(el, {
                    group: 'personal', // Permite mover fichas entre diferentes listas
                    animation: 150,
                    ghostClass: 'sortable-ghost'
                });
            });
        }

        // Función para cambiar entre la vista de día y noche
        function mostrarTurno(turno) {
            document.getElementById('turno-dia').classList.toggle('active', turno === 'dia');
            document.getElementById('turno-noche').classList.toggle('active', turno === 'noche');
        }

        // Función para simular el guardado de cambios
        function guardarCambios() {
            // Aquí iría la lógica para leer el nuevo orden y enviarlo a Supabase
            let resultado = "NUEVO ORDEN:\n";
            document.querySelectorAll('#lista-dia .ubicacion-item').forEach(item => {
                const ubicacion = item.querySelector('.ubicacion-nombre').innerText;
                const nombres = Array.from(item.querySelectorAll('.ficha-personal')).map(ficha => ficha.innerText);
                if (nombres.length > 0) {
                    resultado += `\nUbicación DÍA ${ubicacion}:\n- ${nombres.join('\n- ')}\n`;
                }
            });
            alert(resultado);
            // Aquí llamaríamos a una función tipo: await supabase.from('horarios').upsert(...)
        }

        // Renderizar todo al cargar la página
        document.addEventListener('DOMContentLoaded', renderizarListas);

    </script>
</body>
</html>
